<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Supabase XV</title>
  <!-- CDN del cliente JS de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Prueba de Conexión</h1>

  <form id="form-test">
    <input type="text" id="nombre" placeholder="Tu Nombre" required><br><br>
    
    <label>
      <input type="checkbox" id="asiste" checked> ¿Asiste?
    </label><br><br>

    <input type="text" id="menu" placeholder="Menú especial (opcional)"><br><br>
    <input type="text" id="cancion" placeholder="Canción (opcional)"><br><br>

    <button type="submit">MANDAR PRUEBA</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
